appId: com.pdfsaas.desktop.ocr
productName: PDFSaaS Desktop OCR
copyright: Copyright © PDFSaaS

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - renderer/dist/**/*
  - package.json

asar: true

extraResources:
  - from: resources/runtime
    to: runtime
  - from: resources/libs
    to: libs
  - from: resources/ocr-service
    to: ocr-service

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  artifactName: "${productName}-Setup-${version}.${ext}"
